name: Publish Docker image
on:
  release:
    types: [published]

jobs:
  push_to_registries:
    name: Build image and push to registry
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    
    strategy:
      matrix:
        registry:
          - ghcr.io
          - docker.io

    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.registry }}/mr0grog/test-release-notes
          tags: |
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          # username: ${{ secrets.DOCKER_USERNAME }}
          # password: ${{ secrets.DOCKER_PASSWORD }}
          registry: ${{ matrix.registry }}
          username: ${{ matrix.registry == 'ghcr.io' && github.actor || secrets.DOCKER_USERNAME }}
          password: ${{ matrix.registry == 'ghcr.io' && secrets.GITHUB_TOKEN || secrets.DOCKER_PASSWORD }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # labels: ${{ steps.meta.outputs.labels }}
          # build-args: |
          #   MINIMIZE_IMAGE_SIZE=1

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
